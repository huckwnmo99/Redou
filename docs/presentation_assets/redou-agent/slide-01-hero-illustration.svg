      <stop stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#F2F8FF"/>
    </linearGradient>
    <linearGradient id="board" x1="454" y1="96" x2="1108" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <filter id="shadow-lg" x="0" y="0" width="1200" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#20314E" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="0" y="0" width="1200" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#20314E" flood-opacity="0.06"/>
