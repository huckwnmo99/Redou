  <rect width="1200" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="1068" cy="94" r="92" fill="#E8F0FF"/>
  <circle cx="130" cy="548" r="116" fill="#E7F8F1"/>
  <circle cx="996" cy="548" r="54" fill="#F1F5FF"/>

  <rect x="72" y="74" width="194" height="38" rx="19" fill="#EAF1FF"/>
  <text x="104" y="99" fill="#2453E6" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">REDOU AT A GLANCE</text>

  <text x="72" y="168" fill="#172238" font-family="Inter, Pretendard, sans-serif" font-size="48" font-weight="800">From paper PDFs</text>
  <text x="72" y="220" fill="#172238" font-family="Inter, Pretendard, sans-serif" font-size="48" font-weight="800">to agent answers</text>

  <text x="72" y="286" fill="#5F6D86" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="500">Redou reads research papers, structures the content,</text>
  <text x="72" y="316" fill="#5F6D86" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="500">and lets the agent choose between fast Q&amp;A</text>
  <text x="72" y="346" fill="#5F6D86" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="500">and comparison-table generation.</text>

  <g filter="url(#shadow-sm)">
    <rect x="72" y="404" width="328" height="156" rx="28" fill="#FFFFFF"/>
    <rect x="96" y="430" width="110" height="28" rx="14" fill="#E8F7F2"/>
    <text x="121" y="449" fill="#167D66" font-family="Inter, Pretendard, sans-serif" font-size="14" font-weight="700">WHY IT MATTERS</text>
    <circle cx="110" cy="492" r="6" fill="#2453E6"/>
    <text x="128" y="498" fill="#172238" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="600">No need to reopen every PDF by hand.</text>
    <circle cx="110" cy="530" r="6" fill="#167D66"/>
    <text x="128" y="536" fill="#172238" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="600">The app keeps reusable research memory.</text>
  </g>

