<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#FFF4F6"/>
    </linearGradient>
    <filter id="shadow6" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#172238" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="36" fill="url(#bg6)"/>
  <circle cx="1090" cy="112" r="118" fill="#D9485F" fill-opacity="0.08"/>
  <circle cx="150" cy="608" r="108" fill="#2453E6" fill-opacity="0.06"/>

  <text x="72" y="78" fill="#16243C" font-size="34" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Table mode</text>
  <text x="72" y="112" fill="#5C6D8B" font-size="18" font-family="Inter, Segoe UI, sans-serif">This is the long branch: the system plans first, gathers evidence, parses rows, assembles a table, then verifies with a separate guardian model.</text>

  <rect x="312" y="144" width="642" height="40" rx="20" fill="#F8F5FF" stroke="#6C4FD7" stroke-width="2.5" stroke-dasharray="10 8"/>
  <text x="458" y="169" fill="#6C4FD7" font-size="14" font-family="Inter, Segoe UI, sans-serif" font-weight="800">SHARED ACTIVE LLM FAMILY</text>
  <path d="M404 184V198" stroke="#6C4FD7" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6"/>
  <path d="M792 184V198" stroke="#6C4FD7" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6"/>
  <path d="M988 184V198" stroke="#6C4FD7" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6"/>

  <rect x="1072" y="144" width="154" height="40" rx="20" fill="#E8F7F2" stroke="#167D66" stroke-width="2.5" stroke-dasharray="10 8"/>
  <text x="1097" y="169" fill="#167D66" font-size="14" font-family="Inter, Segoe UI, sans-serif" font-weight="800">DIFFERENT MODEL</text>
  <path d="M1149 184V198" stroke="#167D66" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6"/>

  <g filter="url(#shadow6)">
    <rect x="72" y="196" width="176" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="268" y="196" width="176" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="464" y="196" width="176" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="660" y="196" width="176" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="856" y="196" width="176" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="1052" y="196" width="176" height="228" rx="28" fill="#FFFFFF"/>
  </g>

  <rect x="96" y="220" width="92" height="28" rx="14" fill="#EAF1FF"/>
  <text x="121" y="239" fill="#2453E6" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 1</text>
  <text x="96" y="290" fill="#16243C" font-size="27" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Request</text>
  <text x="96" y="328" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">The user asks</text>
  <text x="96" y="350" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">for a comparison</text>
  <text x="96" y="372" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">table.</text>
  <rect x="96" y="388" width="130" height="32" rx="16" fill="#EAF1FF"/>
  <text x="122" y="408" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">compare request</text>

  <rect x="292" y="220" width="92" height="28" rx="14" fill="#F2EDFF"/>
  <text x="317" y="239" fill="#6C4FD7" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 2</text>
  <text x="292" y="290" fill="#16243C" font-size="27" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Plan</text>
  <text x="292" y="328" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">The orchestrator</text>
  <text x="292" y="350" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">defines columns</text>
  <text x="292" y="372" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">and search queries.</text>
  <rect x="292" y="388" width="124" height="32" rx="16" fill="#F2EDFF"/>
  <text x="313" y="408" fill="#6C4FD7" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">active LLM</text>

  <rect x="488" y="220" width="92" height="28" rx="14" fill="#EAF1FF"/>
  <text x="513" y="239" fill="#2453E6" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 3</text>
  <text x="488" y="286" fill="#16243C" font-size="25" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Retrieve</text>
  <rect x="488" y="314" width="82" height="34" rx="17" fill="#EAF1FF"/>
  <rect x="576" y="314" width="54" height="34" rx="17" fill="#EAF1FF"/>
  <rect x="488" y="356" width="112" height="34" rx="17" fill="#EAF1FF"/>
  <text x="509" y="336" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">vector</text>
  <text x="589" y="336" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">BM25</text>
  <text x="511" y="378" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">figure search</text>
  <rect x="488" y="388" width="118" height="32" rx="16" fill="#EAF1FF"/>
  <text x="507" y="408" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">search tools</text>

  <rect x="684" y="220" width="92" height="28" rx="14" fill="#F2EDFF"/>
  <text x="709" y="239" fill="#6C4FD7" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 4</text>
  <text x="684" y="290" fill="#16243C" font-size="27" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Parse</text>
  <text x="684" y="328" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">Parser and</text>
  <text x="684" y="350" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">extractor turn</text>
  <text x="684" y="372" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">evidence into rows.</text>
  <rect x="684" y="388" width="124" height="32" rx="16" fill="#F2EDFF"/>
  <text x="705" y="408" fill="#6C4FD7" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">active LLM</text>

  <rect x="880" y="220" width="92" height="28" rx="14" fill="#F2EDFF"/>
  <text x="905" y="239" fill="#6C4FD7" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 5</text>
  <text x="880" y="290" fill="#16243C" font-size="27" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Assemble</text>
  <text x="880" y="328" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">Table agent joins</text>
  <text x="880" y="350" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">all rows into</text>
  <text x="880" y="372" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">one table JSON.</text>
  <rect x="880" y="388" width="124" height="32" rx="16" fill="#F2EDFF"/>
  <text x="901" y="408" fill="#6C4FD7" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">active LLM</text>

  <rect x="1076" y="220" width="92" height="28" rx="14" fill="#E8F7F2"/>
  <text x="1101" y="239" fill="#167D66" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 6</text>
  <text x="1076" y="290" fill="#16243C" font-size="27" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Check</text>
  <text x="1076" y="328" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">Guardian checks</text>
  <text x="1076" y="350" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">whether the table</text>
  <text x="1076" y="372" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">matches evidence.</text>
  <rect x="1076" y="388" width="124" height="32" rx="16" fill="#E8F7F2"/>
  <text x="1092" y="408" fill="#167D66" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">guardian model</text>

  <g stroke="#9DB5F4" stroke-width="5" stroke-linecap="round">
    <path d="M248 300H268"/>
    <path d="M444 300H464"/>
    <path d="M640 300H660"/>
    <path d="M836 300H856"/>
    <path d="M1032 300H1052"/>
  </g>
  <g fill="#2453E6">
    <path d="M260 292L274 300L260 308V292Z"/>
    <path d="M456 292L470 300L456 308V292Z"/>
    <path d="M652 292L666 300L652 308V292Z"/>
    <path d="M848 292L862 300L848 308V292Z"/>
    <path d="M1044 292L1058 300L1044 308V292Z"/>
  </g>

  <rect x="72" y="604" width="1136" height="44" rx="22" fill="#FFFFFF" stroke="#E2EBF8"/>
  <text x="98" y="631" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">Key idea: Table mode reuses the same active LLM for plan, parse, and assemble, but verification switches to a different guardian model.</text>
</svg>
