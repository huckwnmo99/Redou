<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <filter id="shadow5" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#172238" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="36" fill="url(#bg5)"/>
  <circle cx="1088" cy="110" r="116" fill="#2453E6" fill-opacity="0.07"/>
  <circle cx="156" cy="610" r="108" fill="#167D66" fill-opacity="0.06"/>

  <text x="72" y="78" fill="#16243C" font-size="34" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Q&amp;A mode</text>
  <text x="72" y="112" fill="#5C6D8B" font-size="18" font-family="Inter, Segoe UI, sans-serif">This is the short branch: search first, pack the evidence, then let the shared active LLM answer.</text>

  <rect x="928" y="60" width="280" height="46" rx="23" fill="#FFFFFF" stroke="#E0E8F6"/>
  <rect x="948" y="74" width="18" height="18" rx="9" fill="#6C4FD7"/>
  <text x="978" y="89" fill="#5C6D8B" font-size="15" font-family="Inter, Segoe UI, sans-serif">shared active LLM family</text>

  <rect x="980" y="170" width="240" height="270" rx="34" fill="#F8F5FF" stroke="#6C4FD7" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="1006" y="146" width="190" height="36" rx="18" fill="#6C4FD7"/>
  <text x="1040" y="169" fill="#FFFFFF" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="800">SHARED ACTIVE LLM</text>

  <g filter="url(#shadow5)">
    <rect x="72" y="188" width="192" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="290" y="188" width="192" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="508" y="188" width="224" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="758" y="188" width="208" height="228" rx="28" fill="#FFFFFF"/>
    <rect x="992" y="188" width="216" height="228" rx="28" fill="#FFFFFF"/>
  </g>

  <rect x="96" y="212" width="92" height="28" rx="14" fill="#EAF1FF"/>
  <text x="121" y="231" fill="#2453E6" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 1</text>
  <text x="96" y="286" fill="#16243C" font-size="28" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Question</text>
  <text x="96" y="328" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">The user asks</text>
  <text x="96" y="352" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">a natural-language</text>
  <text x="96" y="376" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">question.</text>
  <rect x="96" y="390" width="122" height="32" rx="16" fill="#EAF1FF"/>
  <text x="121" y="410" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">user question</text>

  <rect x="314" y="212" width="92" height="28" rx="14" fill="#FFE8ED"/>
  <text x="339" y="231" fill="#D9485F" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 2</text>
  <text x="314" y="286" fill="#16243C" font-size="28" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Embed</text>
  <text x="314" y="328" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">Nemotron turns</text>
  <text x="314" y="352" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">the question into</text>
  <text x="314" y="376" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">a query vector.</text>
  <rect x="314" y="390" width="118" height="32" rx="16" fill="#FFE8ED"/>
  <text x="335" y="410" fill="#D9485F" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">embed model</text>

  <rect x="534" y="212" width="126" height="28" rx="14" fill="#EAF1FF"/>
  <text x="566" y="231" fill="#2453E6" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 3</text>
  <text x="534" y="278" fill="#16243C" font-size="26" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Parallel retrieval</text>
  <rect x="534" y="308" width="92" height="34" rx="17" fill="#EAF1FF"/>
  <rect x="638" y="308" width="82" height="34" rx="17" fill="#EAF1FF"/>
  <rect x="534" y="352" width="108" height="34" rx="17" fill="#EAF1FF"/>
  <text x="560" y="330" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">vector</text>
  <text x="665" y="330" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">BM25</text>
  <text x="563" y="374" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">figure search</text>
  <rect x="534" y="390" width="120" height="32" rx="16" fill="#EAF1FF"/>
  <text x="555" y="410" fill="#2453E6" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">search tools</text>

  <rect x="784" y="212" width="92" height="28" rx="14" fill="#F2EDFF"/>
  <text x="809" y="231" fill="#6C4FD7" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 4</text>
  <text x="784" y="286" fill="#16243C" font-size="28" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Context</text>
  <text x="784" y="328" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">Rerank the hits</text>
  <text x="784" y="352" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">and pack the best</text>
  <text x="784" y="376" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">evidence together.</text>
  <rect x="784" y="390" width="128" height="32" rx="16" fill="#F2EDFF"/>
  <text x="810" y="410" fill="#6C4FD7" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">context pack</text>

  <rect x="1018" y="212" width="92" height="28" rx="14" fill="#F2EDFF"/>
  <text x="1043" y="231" fill="#6C4FD7" font-size="12" font-family="Inter, Segoe UI, sans-serif" font-weight="800">STEP 5</text>
  <text x="1018" y="286" fill="#16243C" font-size="28" font-family="Inter, Segoe UI, sans-serif" font-weight="800">Answer</text>
  <text x="1018" y="328" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">The active LLM</text>
  <text x="1018" y="352" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">writes a grounded</text>
  <text x="1018" y="376" fill="#5C6D8B" font-size="17" font-family="Inter, Segoe UI, sans-serif">response.</text>
  <rect x="1018" y="390" width="146" height="32" rx="16" fill="#F2EDFF"/>
  <text x="1040" y="410" fill="#6C4FD7" font-size="13" font-family="Inter, Segoe UI, sans-serif" font-weight="700">same active LLM</text>

  <g stroke="#9DB5F4" stroke-width="5" stroke-linecap="round">
    <path d="M264 300H290"/>
    <path d="M482 300H508"/>
    <path d="M732 300H758"/>
    <path d="M966 300H992"/>
  </g>
  <g fill="#2453E6">
    <path d="M280 292L294 300L280 308V292Z"/>
    <path d="M498 292L512 300L498 308V292Z"/>
    <path d="M748 292L762 300L748 308V292Z"/>
    <path d="M982 292L996 300L982 308V292Z"/>
  </g>

  <rect x="72" y="604" width="1136" height="44" rx="22" fill="#FFFFFF" stroke="#E2EBF8"/>
  <text x="98" y="631" fill="#5C6D8B" font-size="16" font-family="Inter, Segoe UI, sans-serif">Key idea: Q&amp;A uses one shared active LLM only at the final answer step. Search and packing happen before that.</text>
</svg>
